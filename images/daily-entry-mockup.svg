<svg width="400" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone frame background -->
  <rect width="400" height="700" fill="#FFF8F3" rx="30"/>
  <rect x="10" y="10" width="380" height="680" fill="white" stroke="#806048" stroke-width="3" rx="25"/>
  
  <!-- Status bar -->
  <rect x="10" y="10" width="380" height="40" fill="#d7e6ea" rx="25"/>
  <text x="200" y="35" text-anchor="middle" font-family="Nunito, sans-serif" font-size="12" font-weight="600" fill="#806048">9:41 AM</text>
  
  <!-- Header -->
  <g transform="translate(0, 60)">
    <text x="200" y="30" text-anchor="middle" font-family="Quicksand, sans-serif" font-size="24" font-weight="700" fill="#806048">Today's Entry</text>
    <text x="200" y="55" text-anchor="middle" font-family="Nunito, sans-serif" font-size="14" fill="#6A5344">Sunday, February 1, 2026</text>
  </g>
  
  <!-- Lalah helper -->
  <g transform="translate(320, 120)">
    <!-- Mini Lalah -->
    <circle cx="0" cy="0" r="25" fill="#FFE5CC" stroke="#806048" stroke-width="2"/>
    <!-- Happy face -->
    <path d="M -10 -5 Q -7 -7 -4 -5" stroke="#806048" stroke-width="2" fill="none"/>
    <path d="M 4 -5 Q 7 -7 10 -5" stroke="#806048" stroke-width="2" fill="none"/>
    <path d="M -8 5 Q 0 10 8 5" stroke="#806048" stroke-width="2" fill="none"/>
    <!-- Blush -->
    <circle cx="-12" cy="0" r="3" fill="#FFB6C1" opacity="0.5"/>
    <circle cx="12" cy="0" r="3" fill="#FFB6C1" opacity="0.5"/>
  </g>
  
  <!-- Speech bubble from Lalah -->
  <g transform="translate(180, 130)">
    <rect x="0" y="0" width="120" height="45" fill="white" stroke="#806048" stroke-width="2" rx="8"/>
    <!-- Bubble tail -->
    <path d="M 110 22 L 130 25 L 108 30" fill="white" stroke="#806048" stroke-width="2"/>
    <text x="60" y="18" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="#6A5344">How's your</text>
    <text x="60" y="33" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="#6A5344">mood today?</text>
  </g>
  
  <!-- Mood section -->
  <g transform="translate(30, 200)">
    <text x="0" y="0" font-family="Quicksand, sans-serif" font-size="18" font-weight="700" fill="#806048">😊 Mood</text>
    
    <!-- Sticker buttons -->
    <g transform="translate(0, 20)">
      <!-- Great -->
      <rect x="0" y="0" width="65" height="65" fill="#ffe9b3" stroke="#806048" stroke-width="3" rx="8"/>
      <text x="32" y="30" text-anchor="middle" font-size="24">😊</text>
      <text x="32" y="55" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" font-weight="600" fill="#806048">Great</text>
      
      <!-- Good -->
      <rect x="75" y="0" width="65" height="65" fill="#d0e6db" stroke="#806048" stroke-width="3" rx="8"/>
      <text x="107" y="30" text-anchor="middle" font-size="24">😌</text>
      <text x="107" y="55" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" font-weight="600" fill="#806048">Good</text>
      
      <!-- Okay -->
      <rect x="150" y="0" width="65" height="65" fill="#f7e2d9" stroke="#806048" stroke-width="3" rx="8"/>
      <text x="182" y="30" text-anchor="middle" font-size="24">😐</text>
      <text x="182" y="55" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" font-weight="600" fill="#806048">Okay</text>
      
      <!-- Low -->
      <rect x="225" y="0" width="65" height="65" fill="#c5dde8" stroke="#806048" stroke-width="3" rx="8"/>
      <text x="257" y="30" text-anchor="middle" font-size="24">😔</text>
      <text x="257" y="55" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" font-weight="600" fill="#806048">Low</text>
      
      <!-- Bad -->
      <rect x="300" y="0" width="65" height="65" fill="#eaa090" stroke="#806048" stroke-width="3" rx="8"/>
      <text x="332" y="30" text-anchor="middle" font-size="24">😢</text>
      <text x="332" y="55" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" font-weight="600" fill="#806048">Bad</text>
    </g>
  </g>
  
  <!-- Divider -->
  <line x1="30" y1="310" x2="370" y2="310" stroke="#EDACA0" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Sleep section -->
  <g transform="translate(30, 330)">
    <text x="0" y="0" font-family="Quicksand, sans-serif" font-size="18" font-weight="700" fill="#806048">💤 Sleep</text>
    
    <!-- Sleep stickers (simplified) -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="100" height="50" fill="white" stroke="#806048" stroke-width="3" rx="8"/>
      <text x="50" y="30" text-anchor="middle" font-family="Nunito, sans-serif" font-size="12" fill="#806048">😴 Great</text>
      
      <rect x="110" y="0" width="100" height="50" fill="white" stroke="#806048" stroke-width="3" rx="8"/>
      <text x="160" y="30" text-anchor="middle" font-family="Nunito, sans-serif" font-size="12" fill="#806048">😪 Okay</text>
      
      <rect x="220" y="0" width="100" height="50" fill="white" stroke="#806048" stroke-width="3" rx="8"/>
      <text x="270" y="30" text-anchor="middle" font-family="Nunito, sans-serif" font-size="12" fill="#806048">😫 Poor</text>
    </g>
  </g>
  
  <!-- Divider -->
  <line x1="30" y1="420" x2="370" y2="420" stroke="#EDACA0" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Add note section -->
  <g transform="translate(30, 440)">
    <text x="0" y="0" font-family="Quicksand, sans-serif" font-size="16" font-weight="700" fill="#806048">📝 Add a note (optional)</text>
    
    <rect x="0" y="10" width="340" height="80" fill="#FFF8F0" stroke="#806048" stroke-width="2" rx="8"/>
    <text x="10" y="35" font-family="Nunito, sans-serif" font-size="12" fill="#6A5344" opacity="0.5">What's on your mind?</text>
    <text x="10" y="55" font-family="Nunito, sans-serif" font-size="11" fill="#6A5344" opacity="0.5">No pressure to write anything...</text>
  </g>
  
  <!-- Save button -->
  <g transform="translate(30, 555)">
    <rect x="0" y="0" width="340" height="55" fill="#d0e6db" stroke="#806048" stroke-width="3" rx="12"/>
    <rect x="3" y="3" width="340" height="55" fill="#d0e6db" stroke="none" rx="12"/>
    <text x="170" y="35" text-anchor="middle" font-family="Quicksand, sans-serif" font-size="18" font-weight="700" fill="#806048">Save Entry ✓</text>
  </g>
  
  <!-- Bottom helper text -->
  <text x="200" y="640" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="#6A5344">Tap • Done • Move on 💚</text>
  
  <!-- Frame shadow -->
  <rect x="10" y="10" width="380" height="680" fill="none" stroke="#806048" stroke-width="3" rx="25"/>
</svg>
