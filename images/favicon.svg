<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- slight playful tilt -->
  <g transform="rotate(-3 32 32)">

    <!-- top-left : Great -->
    <rect x="6" y="6" width="24" height="24"
          fill="#ffe9b3"
          stroke="#6b4e2e"
          stroke-width="3"
          rx="2"/>

    <!-- top-right : Good -->
    <rect x="34" y="6" width="24" height="24"
          fill="#d0e6db"
          stroke="#6b4e2e"
          stroke-width="3"
          rx="2"/>

    <!-- bottom-left : Okay -->
    <rect x="6" y="34" width="24" height="24"
          fill="#f7e2d9"
          stroke="#6b4e2e"
          stroke-width="3"
          rx="2"/>

    <!-- bottom-right : Low -->
    <rect x="34" y="34" width="24" height="24"
          fill="#c5dde8"
          stroke="#6b4e2e"
          stroke-width="3"
          rx="2"/>

  </g>

</svg>
