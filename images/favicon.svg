  <rect x="40" y="16" width="8" height="8" fill="#ffe9b3" stroke="#806048" stroke-width="1"/>
  <!-- Row 3: mood-good green -->
  <rect x="16" y="24" width="8" height="8" fill="#d0e6db" stroke="#806048" stroke-width="1"/>
  <rect x="40" y="24" width="8" height="8" fill="#d0e6db" stroke="#806048" stroke-width="1"/>
  <!-- Row 4: mood-good green -->
  <rect x="16" y="32" width="8" height="8" fill="#d0e6db" stroke="#806048" stroke-width="1"/>
  <rect x="24" y="32" width="8" height="8" fill="#d0e6db" stroke="#806048" stroke-width="1"/>
