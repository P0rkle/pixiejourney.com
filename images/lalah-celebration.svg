<svg width="300" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="400" fill="#FFF8F3"/>
  
  <!-- Lalah Celebration Pose (Arms Up!) -->
  <g transform="translate(150, 200)">
    
    <!-- Body (Simple dress shape) -->
    <ellipse cx="0" cy="40" rx="50" ry="60" fill="#d0e6db" stroke="#806048" stroke-width="3"/>
    
    <!-- Head (Large circle - kawaii proportions) -->
    <circle cx="0" cy="-30" r="60" fill="#FFE5CC" stroke="#806048" stroke-width="3"/>
    
    <!-- Hair (Golden) -->
    <!-- Hair swoosh on top (bouncy!) -->
    <path d="M -40 -70 Q -20 -95 0 -90 Q 20 -95 40 -70" fill="#FFD700" stroke="#806048" stroke-width="3"/>
    <!-- Side bangs -->
    <ellipse cx="-35" cy="-50" rx="20" ry="30" fill="#FFD700" stroke="#806048" stroke-width="2"/>
    <ellipse cx="35" cy="-50" rx="20" ry="30" fill="#FFD700" stroke="#806048" stroke-width="2"/>
    
    <!-- Face (EXCITED!) -->
    <!-- Big open eyes -->
    <circle cx="-20" cy="-35" r="8" fill="white" stroke="#806048" stroke-width="3"/>
    <circle cx="-20" cy="-35" r="4" fill="#806048"/>
    <circle cx="20" cy="-35" r="8" fill="white" stroke="#806048" stroke-width="3"/>
    <circle cx="20" cy="-35" r="4" fill="#806048"/>
    <!-- Big excited smile (D-mouth) -->
    <ellipse cx="0" cy="-12" rx="15" ry="8" fill="#806048"/>
    <!-- Rosy blush (extra rosy from excitement) -->
    <circle cx="-35" cy="-25" r="10" fill="#FFB6C1" opacity="0.6"/>
    <circle cx="35" cy="-25" r="10" fill="#FFB6C1" opacity="0.6"/>
    
    <!-- Wings (Translucent, fluttering up) -->
    <g opacity="0.7">
      <!-- Left wing (raised) -->
      <ellipse cx="-50" cy="0" rx="28" ry="45" fill="#E8F4F8" stroke="#806048" stroke-width="2" transform="rotate(-35 -50 0)"/>
      <!-- Right wing (raised) -->
      <ellipse cx="50" cy="0" rx="28" ry="45" fill="#E8F4F8" stroke="#806048" stroke-width="2" transform="rotate(35 50 0)"/>
    </g>
    
    <!-- Arms (RAISED UP in celebration!) -->
    <!-- Left arm (way up!) -->
    <ellipse cx="-25" cy="-30" rx="12" ry="35" fill="#FFE5CC" stroke="#806048" stroke-width="2" transform="rotate(-60 -25 -30)"/>
    <!-- Right arm (way up!) -->
    <ellipse cx="25" cy="-30" rx="12" ry="35" fill="#FFE5CC" stroke="#806048" stroke-width="2" transform="rotate(60 25 -30)"/>
    
    <!-- Hands (Small circles, raised high) -->
    <circle cx="-40" cy="-55" r="8" fill="#FFE5CC" stroke="#806048" stroke-width="2"/>
    <circle cx="40" cy="-55" r="8" fill="#FFE5CC" stroke="#806048" stroke-width="2"/>
    
    <!-- Dress details -->
    <path d="M -15 5 Q 0 10 15 5" stroke="#806048" stroke-width="2" fill="none"/>
    
    <!-- Celebration sparkles EVERYWHERE! -->
    <text x="-90" y="-80" font-size="28" fill="#FFD700">✨</text>
    <text x="80" y="-75" font-size="26" fill="#FFD700">✨</text>
    <text x="-85" y="90" font-size="24" fill="#FFD700">✨</text>
    <text x="85" y="85" font-size="24" fill="#FFD700">✨</text>
    <text x="0" y="-95" font-size="30" fill="#FFD700">🎉</text>
    <text x="-100" y="0" font-size="22" fill="#FFD700">⭐</text>
    <text x="95" y="5" font-size="22" fill="#FFD700">⭐</text>
    
  </g>
  
  <!-- Label -->
  <text x="150" y="380" text-anchor="middle" font-family="Quicksand, sans-serif" font-size="18" font-weight="700" fill="#806048">Lalah</text>
  <text x="150" y="395" text-anchor="middle" font-family="Nunito, sans-serif" font-size="12" fill="#6A5344">Celebrating with you! 🎉</text>
</svg>
