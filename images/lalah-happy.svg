<svg width="300" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="400" fill="#FFF8F3"/>
  
  <!-- Lalah Happy Pose -->
  <g transform="translate(150, 200)">
    
    <!-- Body (Simple dress shape) -->
    <ellipse cx="0" cy="40" rx="50" ry="60" fill="#d0e6db" stroke="#806048" stroke-width="3"/>
    
    <!-- Head (Large circle - kawaii proportions) -->
    <circle cx="0" cy="-30" r="60" fill="#FFE5CC" stroke="#806048" stroke-width="3"/>
    
    <!-- Hair (Golden) -->
    <!-- Hair swoosh on top -->
    <path d="M -40 -70 Q -20 -90 0 -85 Q 20 -90 40 -70" fill="#FFD700" stroke="#806048" stroke-width="3"/>
    <!-- Side bangs -->
    <ellipse cx="-35" cy="-50" rx="20" ry="30" fill="#FFD700" stroke="#806048" stroke-width="2"/>
    <ellipse cx="35" cy="-50" rx="20" ry="30" fill="#FFD700" stroke="#806048" stroke-width="2"/>
    
    <!-- Face -->
    <!-- Squinty happy eyes -->
    <path d="M -25 -35 Q -20 -38 -15 -35" stroke="#806048" stroke-width="3" fill="none"/>
    <path d="M 15 -35 Q 20 -38 25 -35" stroke="#806048" stroke-width="3" fill="none"/>
    <!-- Big happy smile -->
    <path d="M -20 -15 Q 0 -5 20 -15" stroke="#806048" stroke-width="3" fill="none"/>
    <!-- Rosy blush -->
    <circle cx="-30" cy="-25" r="8" fill="#FFB6C1" opacity="0.5"/>
    <circle cx="30" cy="-25" r="8" fill="#FFB6C1" opacity="0.5"/>
    
    <!-- Wings (Translucent behind body) -->
    <g opacity="0.6">
      <!-- Left wing -->
      <ellipse cx="-45" cy="20" rx="25" ry="40" fill="#E8F4F8" stroke="#806048" stroke-width="2" transform="rotate(-20 -45 20)"/>
      <!-- Right wing -->
      <ellipse cx="45" cy="20" rx="25" ry="40" fill="#E8F4F8" stroke="#806048" stroke-width="2" transform="rotate(20 45 20)"/>
    </g>
    
    <!-- Arms (Simple ovals) -->
    <!-- Left arm (slightly raised) -->
    <ellipse cx="-35" cy="10" rx="12" ry="30" fill="#FFE5CC" stroke="#806048" stroke-width="2" transform="rotate(-30 -35 10)"/>
    <!-- Right arm (slightly raised) -->
    <ellipse cx="35" cy="10" rx="12" ry="30" fill="#FFE5CC" stroke="#806048" stroke-width="2" transform="rotate(30 35 10)"/>
    
    <!-- Hands (Small circles) -->
    <circle cx="-45" cy="-5" r="8" fill="#FFE5CC" stroke="#806048" stroke-width="2"/>
    <circle cx="45" cy="-5" r="8" fill="#FFE5CC" stroke="#806048" stroke-width="2"/>
    
    <!-- Dress details (Simple neckline) -->
    <path d="M -15 5 Q 0 10 15 5" stroke="#806048" stroke-width="2" fill="none"/>
    
    <!-- Sparkles around Lalah -->
    <text x="-80" y="-60" font-size="24" fill="#FFD700">✨</text>
    <text x="70" y="-50" font-size="20" fill="#FFD700">✨</text>
    <text x="-70" y="80" font-size="18" fill="#FFD700">✨</text>
    <text x="75" y="70" font-size="22" fill="#FFD700">✨</text>
    
  </g>
  
  <!-- Label -->
  <text x="150" y="380" text-anchor="middle" font-family="Quicksand, sans-serif" font-size="18" font-weight="700" fill="#806048">Lalah</text>
  <text x="150" y="395" text-anchor="middle" font-family="Nunito, sans-serif" font-size="12" fill="#6A5344">Your supportive companion</text>
</svg>
